# Terminal
set -g default-terminal "tmux-256color"
set -g terminal-overrides ",xterm-256color:Tc"
set -g extended-keys on

# Prefix
unbind C-b
set -g prefix C-a

# Key bindings — pane switching (vi-style)
unbind-key j
unbind-key k
unbind-key h
unbind-key l
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R

# General
set -g mode-keys vi
set -g history-limit 64096
set -sg escape-time 10
set -g set-titles on
set -g set-titles-string "#T"
set -g renumber-windows on       # fill gaps when windows close
set -g automatic-rename off
set -g repeat-time 0
set -g focus-events on
set -g base-index 1        # start indexing windows at 1
set -g detach-on-destroy off         # don't exit TMUX when closing a session 
set -g set-clipboard external

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'omerxx/tmux-sessionx'

# Plugin config
## Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

## Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g window-status-separator ""      # rounded separators handle spacing; default space causes overlap

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# Status line — must be set after TPM run (Catppuccin modules not available before)
set -g status-position "top"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right ""
